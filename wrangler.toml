name = "govd"
main = "src/index.ts"          # <-- cambia se il tuo entry point è diverso (es. dist/index.js)
compatibility_date = "2026-06-10"
compatibility_flags = [ "nodejs_compat" ]

[observability.logs]
enabled = true
invocation_logs = true

[observability.traces]

[[kv_namespaces]]
binding = "BOT_KV"
id = "fa61343228ef41f094d3c00e5023db6f"

[vars]
BOT_USERNAME = "patatina_downloader_bot"
OWNER_ID = "123456789"
BOT_API_URL = "https://api.telegram.org"
CONCURRENT_UPDATES = "50"
DOWNLOADS_DIR = "downloads"
MAX_DURATION = "3600"
MAX_FILE_SIZE = "1000"
DEFAULT_ENABLE_CAPTIONS = "true"
DEFAULT_ENABLE_SILENT = "false"
DEFAULT_ENABLE_NSFW = "true"
DEFAULT_MEDIA_ALBUM_LIMIT = "10"
DEFAULT_LANGUAGE = "it"
DEFAULT_DELETE_LINKS = "true"
REPO_URL = "https://github.com/govdbot/govd"
LOG_LEVEL = "info"
CACHING = "true"
CAPTIONS_HEADER = "<a href='{{url}}'>source</a> - @{{username}}"
CAPTIONS_DESCRIPTION = "<blockquote>{{text}}</blockquote>"
AUTOMATIC_LANGUAGE_DETECTION = "true"
# Segreti — impostali con wrangler secret put <NOME>:
#   wrangler secret put TWITTER_BEARER_TOKEN
#   wrangler secret put INSTAGRAM_COOKIES
#   wrangler secret put TIKTOK_COOKIES
